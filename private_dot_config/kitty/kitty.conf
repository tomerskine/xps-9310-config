# Font settings
font_family      JetBrainsMono Nerd Font
font_size        11.0

# Transparent background with blur (adjust alpha from 0.0 to 1.0)
background_opacity 0.85
background_blur 1

# Hide window titlebar
hide_window_decorations yes

# Color scheme (or specify any theme you prefer)
include ~/.config/kitty/theme.conf
